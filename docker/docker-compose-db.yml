# =============================================================================
# docker-compose-db.yml — 仅启动知识库依赖的数据库服务（本地开发用）
#
# 在项目根目录执行：
#   docker compose -f docker/docker-compose-db.yml up -d
#   docker compose -f docker/docker-compose-db.yml down
#   docker compose -f docker/docker-compose-db.yml logs -f
# =============================================================================

services:

  # ── MySQL 8.0 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: react-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: knowledge
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - react-mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 6
    networks:
      - react-db-net

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: react-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - react-redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    networks:
      - react-db-net

volumes:
  react-mysql-data:
  react-redis-data:

networks:
  react-db-net:
    driver: bridge
